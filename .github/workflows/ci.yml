name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Allow only one CI run per branch at a time; cancel older ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
